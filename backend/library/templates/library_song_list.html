
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 0 1rem; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 1rem; }
.user-info { display: flex; align-items: center; gap: 12px; }
.avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--color-background-info); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; color: var(--color-text-info); flex-shrink: 0; }
.user-name { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.user-email { font-size: 12px; color: var(--color-text-secondary); }
.stats { display: flex; gap: 8px; }
.stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 16px; text-align: center; }
.stat-num { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.stat-label { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.toolbar input, .toolbar select { font-size: 13px; padding: 6px 10px; height: 32px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); }
.toolbar input { flex: 1; min-width: 140px; }
.song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
.song-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; transition: border-color 0.15s; }
.song-card:hover { border-color: var(--color-border-secondary); }
.song-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-meta { display: flex; gap: 6px; flex-wrap: wrap; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: var(--border-radius-md); font-weight: 400; }
.badge-genre { background: #EEEDFE; color: #3C3489; }
.badge-mood { background: #E1F5EE; color: #085041; }
.badge-occasion { background: #FAEEDA; color: #633806; }
.song-detail { font-size: 12px; color: var(--color-text-secondary); display: flex; align-items: center; gap: 4px; }
.song-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; padding-top: 8px; border-top: 0.5px solid var(--color-border-tertiary); }
.duration { font-size: 12px; color: var(--color-text-secondary); font-variant-numeric: tabular-nums; }
.remove-btn { font-size: 11px; color: var(--color-text-danger); background: none; border: 0.5px solid var(--color-border-danger); border-radius: var(--border-radius-md); padding: 3px 8px; cursor: pointer; }
.remove-btn:hover { background: var(--color-background-danger); }
.empty { text-align: center; padding: 3rem 1rem; color: var(--color-text-secondary); font-size: 14px; }
.note { font-size: 11px; color: var(--color-text-tertiary); margin-top: 4px; }
</style>

<div class="header">
  <div class="user-info">
    <div class="avatar" id="avatar">JD</div>
    <div>
      <div class="user-name" id="user-name">John Doe</div>
      <div class="user-email" id="user-email">john@example.com</div>
    </div>
  </div>
  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="total-count">0</div>
      <div class="stat-label">songs</div>
    </div>
  </div>
</div>

<div class="toolbar">
  <input type="text" id="search" placeholder="Search by title or singer..." oninput="renderSongs()" />
  <select id="filter-genre" onchange="renderSongs()">
    <option value="">All genres</option>
  </select>
  <select id="filter-mood" onchange="renderSongs()">
    <option value="">All moods</option>
  </select>
</div>

<div class="song-grid" id="song-grid"></div>
<div class="empty" id="empty-state" style="display:none;">No songs match your filters.</div>
<p class="note" style="margin-top:1rem;">This is a frontend mockup — connect to <code>GET /library/&lt;user_id&gt;/</code> to load real data.</p>

<script>
const library = {
  user: { name: "John Doe", email: "john@example.com" },
  songs: [
    { id: 1, title: "Golden Hour",       genre: "Pop",       mood_tone: "Romantic",  occasion: "Wedding",    singer_voice: "Soft tenor",     meaning: "Enjoying a perfect moment",    song_durations: "03:42" },
    { id: 2, title: "Midnight Drive",    genre: "R&B",       mood_tone: "Chill",     occasion: "Nighttime",  singer_voice: "Smooth baritone", meaning: "Solitude on open roads",        song_durations: "04:15" },
    { id: 3, title: "Rise Up",           genre: "Gospel",    mood_tone: "Uplifting", occasion: "Graduation", singer_voice: "Powerful alto",   meaning: "Overcoming adversity",          song_durations: "05:01" },
    { id: 4, title: "Paper Planes",      genre: "Indie",     mood_tone: "Nostalgic", occasion: "Roadtrip",   singer_voice: "Raspy soprano",   meaning: "Chasing childhood dreams",      song_durations: "03:28" },
    { id: 5, title: "Ocean Eyes",        genre: "Dream Pop", mood_tone: "Melancholy",occasion: "Heartbreak", singer_voice: "Breathy soprano", meaning: "Lost in someone's gaze",        song_durations: "03:55" },
    { id: 6, title: "Running Wild",      genre: "Country",   mood_tone: "Energetic", occasion: "Party",      singer_voice: "Warm tenor",      meaning: "Living free without limits",    song_durations: "02:58" },
  ]
};

let songs = [...library.songs];

const user = library.user;
document.getElementById("user-name").textContent = user.name;
document.getElementById("user-email").textContent = user.email;
document.getElementById("avatar").textContent = user.name.split(" ").map(w => w[0]).join("").slice(0,2).toUpperCase();

function populateFilters() {
  const genres = [...new Set(songs.map(s => s.genre))];
  const moods  = [...new Set(songs.map(s => s.mood_tone))];
  const gSel = document.getElementById("filter-genre");
  const mSel = document.getElementById("filter-mood");
  genres.forEach(g => { const o = document.createElement("option"); o.value = g; o.textContent = g; gSel.appendChild(o); });
  moods.forEach(m  => { const o = document.createElement("option"); o.value = m; o.textContent = m; mSel.appendChild(o); });
}

function renderSongs() {
  const q     = document.getElementById("search").value.toLowerCase();
  const genre = document.getElementById("filter-genre").value;
  const mood  = document.getElementById("filter-mood").value;

  const filtered = songs.filter(s =>
    (!q     || s.title.toLowerCase().includes(q) || s.singer_voice.toLowerCase().includes(q)) &&
    (!genre || s.genre === genre) &&
    (!mood  || s.mood_tone === mood)
  );

  document.getElementById("total-count").textContent = songs.length;
  const grid  = document.getElementById("song-grid");
  const empty = document.getElementById("empty-state");

  if (!filtered.length) { grid.innerHTML = ""; empty.style.display = "block"; return; }
  empty.style.display = "none";

  grid.innerHTML = filtered.map(s => `
    <div class="song-card" id="card-${s.id}">
      <div class="song-title">${s.title}</div>
      <div class="song-meta">
        <span class="badge badge-genre">${s.genre}</span>
        <span class="badge badge-mood">${s.mood_tone}</span>
        <span class="badge badge-occasion">${s.occasion}</span>
      </div>
      <div class="song-detail">
        <span style="color:var(--color-text-tertiary);">&#9835;</span>
        <span>${s.singer_voice}</span>
      </div>
      <div class="song-detail" style="font-style:italic;">"${s.meaning}"</div>
      <div class="song-footer">
        <span class="duration">${s.song_durations}</span>
        <button class="remove-btn" onclick="removeSong(${s.id})">Remove</button>
      </div>
    </div>
  `).join("");
}

function removeSong(id) {
  songs = songs.filter(s => s.id !== id);
  renderSongs();
}

populateFilters();
renderSongs();
</script>
